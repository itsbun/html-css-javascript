<!-- Reset Password Pages -->
<link rel="stylesheet" href="./pages/reset-password/reset-password.css" />

<div class="reset-password__header">
  <img src="../../assets/ic-lock.svg" alt="Lock Icon" />
  <h2 class="reset-password__title">Set a new password</h2>
  <p class="reset-password__description">
    Choose a strong password you haven't used before. It must be at least 8
    characters.
  </p>
</div>

<form id="resetPasswordForm">
  <div class="reset-password__form">
    <div class="reset-password__field">
      <label for="password">New password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Create a new password"
      />
      <p class="reset-password__error"></p>
    </div>
    <div class="reset-password__field">
      <label for="confirmPassword">Confirm new password</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        placeholder="Re-enter your new password"
      />
      <p class="confirm-reset-password__error"></p>
    </div>
  </div>

  <button type="submit" class="reset-password__submit">Update password</button>
</form>

<div class="reset-password__footer">
  <img src="../../assets/ic-arrow-left.svg" alt="arrow-left" />
  <a href="?page=login" class="reset-password__back-link"> Back to sign in </a>
</div>
