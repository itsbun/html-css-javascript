<link rel="stylesheet" href="./pages/forgot-password/forgot-password.css" />

<div class="forgot-password__header">
  <img src="../../assets/ic-email.svg" alt="Forgot Password Icon" />

  <h2 class="forgot-password__title">Forgot Password</h2>
  
  <p class="forgot-password__description">
    No problem. Enter the email tied to your account and we'll send you a reset
    link.
  </p>
</div>

<form id="forgotPasswordForm">
  <div class="forgot-password__form">
    <div class="forgot-password__field">
      <label for="email">Email</label>

      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@company.com"
      />
      
      <p class="forgot-password__error"></p>
    </div>
  </div>

  <button type="submit" class="forgot-password__submit">Send reset link</button>
</form>

<div class="forgot-password__footer">
  <img src="../../assets/ic-arrow-left.svg" alt="arrow-left" />
  <a href="?page=login" class="forgot-password__back-link"> Back to sign in </a>
</div>
